version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - SQLITE_PATH=/app/data/notes.db
    volumes:
      - .:/app
      - notes_data:/app/data
    command: ["scripts/start.sh"]
    restart: unless-stopped

volumes:
  notes_data:
