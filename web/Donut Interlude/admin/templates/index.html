<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Donut Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <header>
        <h1>🍩 Sweet CTF Donuts</h1>
        <p>Objectively the best dictionaries of flavor in cyberspace!</p>
    </header>
    
    <main class="container">
        <div id="donut-container" class="donut-grid">
            <!-- Donuts will be injected here via JavaScript -->
            <div class="loader">Loading fresh donuts...</div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Sweet CTF Donuts.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
