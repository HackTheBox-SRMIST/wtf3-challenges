<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Account — Banco de España Digital</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏦</text></svg>">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <span class="logo">🏦</span>
      <span class="brand-text">Banco de <span>España</span> Digital</span>
    </a>
    <ul class="navbar-links">
      <li><a href="/login.html">Sign In</a></li>
      <li><a href="/register.html" class="btn btn-primary btn-sm active">Open Account</a></li>
    </ul>
  </nav>

  <div class="auth-container">
    <div class="card auth-card">
      <h2>Open Your Account</h2>
      <p class="subtitle">Join Banco de España Digital — start with €10,000 in your account</p>
      <div class="alert alert-error" id="errorAlert"></div>
      <div class="alert alert-success" id="successAlert"></div>
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required minlength="3">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-gold btn-block btn-lg" id="submitBtn">Create Account</button>
      </form>
      <p class="form-footer mt-3">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </div>

  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorAlert');
      const ok = document.getElementById('successAlert');
      err.style.display = 'none'; ok.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/register', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            name: document.getElementById('name').value,
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok) {
          ok.textContent = 'Account created! Redirecting...'; ok.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard.html', 800);
        } else {
          err.textContent = data.error; err.style.display = 'block';
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      } catch(e) {
        err.textContent = 'Network error.'; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    }
    if (document.cookie.includes('session=')) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
