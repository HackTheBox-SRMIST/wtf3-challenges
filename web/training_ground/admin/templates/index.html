<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Training Ground CTF Challenge">
    <title>training ground</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to the Training Ground</h1>
        <p class="subtitle">Only the most observant can find the hidden secrets...</p>
        
        <div class="robot-container">
            <!-- Inline SVG Robot -->
            <svg id="robot" class="robot" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Head -->
                <rect x="25" y="20" width="50" height="40" rx="10" fill="#2c3e50" stroke="#00f0ff" stroke-width="2"/>
                <!-- Eyes -->
                <rect class="eye left-eye" x="35" y="30" width="10" height="10" rx="2" fill="#00f0ff" />
                <rect class="eye right-eye" x="55" y="30" width="10" height="10" rx="2" fill="#00f0ff" />
                <!-- Antenna -->
                <line x1="50" y1="20" x2="50" y2="5" stroke="#00f0ff" stroke-width="2"/>
                <circle cx="50" cy="5" r="3" fill="#ff0055" />
                <!-- Mouth -->
                <line x1="40" y1="48" x2="60" y2="48" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
                <!-- Body Base -->
                <path d="M 35 60 L 65 60 L 75 90 L 25 90 Z" fill="#1a252f" stroke="#00f0ff" stroke-width="2"/>
                <!-- Chest Accent -->
                <circle cx="50" cy="75" r="6" fill="transparent" stroke="#00f0ff" stroke-width="2"/>
            </svg>
        </div>

        <p class="hint">Hint: Have you checked the blueprints?</p>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
